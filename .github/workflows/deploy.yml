name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Public env vars — site key is public by design, Worker URL is
          # visible to every browser that hits the form. Not secrets.
          VITE_WORKER_URL: https://parker-bags.kseow.workers.dev
          VITE_TURNSTILE_SITE_KEY: 0x4AAAAAADPq10YP2PpjLRfE
        run: npm run build

      - name: Add SPA 404 fallback
        # GH Pages serves 404.html for unknown paths. Copying index.html
        # there lets the React Router app handle deep links like /encyclopedia/al.
        run: cp dist/index.html dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
