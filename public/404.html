<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Trader Parker's Bag Bazaar</title>
    <!--
      GitHub Pages SPA fallback. When a visitor lands on a deep link like
      /traderparkers/encyclopedia/ga that doesn't exist as a static file, GH Pages
      serves THIS page. The script below encodes the original path as a
      query param (?p=/encyclopedia/ga) and redirects to the SPA's index,
      where main.tsx restores the path via history.replaceState before
      React Router mounts.
    -->
    <script>
      (function () {
        var segmentsToKeep = 1 // matches `/traderparkers/` base path; bump if base path is deeper.
        var l = window.location
        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname
              .split('/')
              .slice(0, 1 + segmentsToKeep)
              .join('/') +
            '/?p=/' +
            l.pathname
              .slice(1)
              .split('/')
              .slice(segmentsToKeep)
              .join('/')
              .replace(/&/g, '~and~') +
            (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash,
        )
      })()
    </script>
  </head>
  <body></body>
</html>
